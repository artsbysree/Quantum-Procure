kind = "web"
previewPath = "/"
title = "QProcure — Quantum Decision Intelligence Platform"
version = "1.0.0"
id = "artifacts/qprocure"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20725

[services.development]
run = "pnpm --filter @workspace/qprocure run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qprocure", "run", "build" ]
publicDir = "artifacts/qprocure/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20725"
BASE_PATH = "/"
